# PostgreSQL + pgvector para testes de integração
# Uso: docker compose -f docker-compose.test.yml up -d
# Destrói: docker compose -f docker-compose.test.yml down -v

services:
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: contabai_test_db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: contabai_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 2s
      timeout: 5s
      retries: 10
