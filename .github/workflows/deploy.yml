name: Deploy ContabAI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.repo.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Login no ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalizar nome do repositório (lowercase)
        id: repo
        run: echo "name=$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push — migrator
        uses: docker/build-push-action@v5
        with:
          context: .
          target: migrator
          push: true
          tags: ${{ steps.repo.outputs.name }}-migrate:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Build e push — app
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.repo.outputs.name }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sincronizar docker-compose.yml para a VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: docker-compose.yml
          target: /home/deploy/contabai/

      - name: Deploy na VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_TAG: ${{ github.ref_name }}
          GHCR_IMAGE: ${{ needs.build.outputs.image }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 15m
          request_pty: true
          envs: DEPLOY_TAG,GHCR_IMAGE,GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            APP_DIR="/home/deploy/contabai"

            # Backup do banco antes de qualquer alteração
            mkdir -p $APP_DIR/backups
            BACKUP_FILE="$APP_DIR/backups/db-${DEPLOY_TAG}-$(date +%Y%m%d-%H%M%S).sql"
            docker exec postgresql-4cnu-postgresql-1 pg_dump -U Mff5dGrSBI3NASY7 contabil_ia > "$BACKUP_FILE"
            echo "📦 Backup: $BACKUP_FILE"
            ls -t $APP_DIR/backups/*.sql 2>/dev/null | tail -n +11 | xargs -r rm -f

            # Pull das imagens já buildadas no CI (sem build na VPS)
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull ${GHCR_IMAGE}-migrate:${DEPLOY_TAG}
            docker pull ${GHCR_IMAGE}:${DEPLOY_TAG}

            # Re-tag para o nome que o docker-compose.yml espera
            docker tag ${GHCR_IMAGE}:${DEPLOY_TAG} contabai:latest

            # Resolve migrations com falha antes de aplicar (idempotente)
            DB_URL=$(grep '^DATABASE_URL=' "$APP_DIR/.env" | cut -d= -f2- | sed 's/^["'"'"']//;s/["'"'"']$//')
            docker run --rm \
              --network contabil_net \
              -e DATABASE_URL="$DB_URL" \
              --entrypoint sh \
              ${GHCR_IMAGE}-migrate:${DEPLOY_TAG} \
              -c "npx prisma migrate resolve --rolled-back 20260327000001_assinatura_provedor 2>/dev/null || true" || true

            # Roda migrations
            docker run --rm \
              --network contabil_net \
              -e DATABASE_URL="$DB_URL" \
              ${GHCR_IMAGE}-migrate:${DEPLOY_TAG}

            # Inicializa schema de vetores pgvector (idempotente — seguro rodar sempre)
            docker exec postgresql-4cnu-postgresql-1 psql -U Mff5dGrSBI3NASY7 contabil_ia << 'EOSQL'
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE SCHEMA IF NOT EXISTS vectors;
            CREATE TABLE IF NOT EXISTS vectors.embeddings (
              id            UUID        PRIMARY KEY DEFAULT gen_random_uuid(),
              escopo        TEXT        NOT NULL CHECK (escopo IN ('global', 'cliente', 'lead')),
              tipo          TEXT        NOT NULL,
              cliente_id    TEXT        REFERENCES public.clientes(id) ON DELETE CASCADE,
              lead_id       TEXT        REFERENCES public.leads(id) ON DELETE CASCADE,
              documento_id  TEXT,
              titulo        TEXT,
              conteudo      TEXT        NOT NULL,
              embedding     vector(512),
              metadata      JSONB,
              criado_em     TIMESTAMPTZ NOT NULL DEFAULT now()
            );
            CREATE INDEX IF NOT EXISTS embeddings_hnsw_idx ON vectors.embeddings USING hnsw (embedding vector_cosine_ops) WITH (m = 16, ef_construction = 128);
            CREATE INDEX IF NOT EXISTS embeddings_escopo_idx    ON vectors.embeddings (escopo);
            CREATE INDEX IF NOT EXISTS embeddings_tipo_idx      ON vectors.embeddings (tipo);
            CREATE INDEX IF NOT EXISTS embeddings_cliente_idx   ON vectors.embeddings (cliente_id) WHERE cliente_id IS NOT NULL;
            CREATE INDEX IF NOT EXISTS embeddings_lead_idx      ON vectors.embeddings (lead_id) WHERE lead_id IS NOT NULL;
            EOSQL
            echo "✅ Schema vectors ok"

            # Sobe o app sem derrubar outros containers
            cd $APP_DIR
            docker compose up -d --no-deps app

            # Remove imagens antigas do ghcr (mantém só a versão atual)
            docker images --format "{{.Repository}}:{{.Tag}}" \
              | grep "ghcr.io/alissonsaraiva/contabilai" \
              | grep -v ":${DEPLOY_TAG}" \
              | grep -v ":latest" \
              | xargs -r docker rmi -f 2>/dev/null || true
            # Dangling e build cache
            docker image prune -f
            docker builder prune -f 2>/dev/null || true

            echo "✅ Deploy $DEPLOY_TAG concluído!"
