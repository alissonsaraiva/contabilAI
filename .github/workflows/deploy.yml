name: Deploy ContabAI

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy na VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DEPLOY_TAG: ${{ github.ref_name }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 30m
          request_pty: true
          envs: DEPLOY_TAG
          script: |
            set -e
            APP_DIR="/home/deploy/contabai"
            git config --global --add safe.directory $APP_DIR
            cd $APP_DIR

            git fetch --tags origin
            git reset --hard $DEPLOY_TAG

            # Backup do banco antes de qualquer alteração
            mkdir -p $APP_DIR/backups
            BACKUP_FILE="$APP_DIR/backups/db-${DEPLOY_TAG}-$(date +%Y%m%d-%H%M%S).sql"
            docker exec postgresql-4cnu-postgresql-1 pg_dump -U Mff5dGrSBI3NASY7 contabil_ia > "$BACKUP_FILE"
            echo "📦 Backup: $BACKUP_FILE"

            # Manter 10 backups mais recentes
            ls -t $APP_DIR/backups/*.sql 2>/dev/null | tail -n +11 | xargs -r rm -f

            # Build da imagem direto na VPS
            docker builder prune --all -f
            SENTRY_DSN="$(grep NEXT_PUBLIC_SENTRY_DSN .env | cut -d= -f2)"
            SENTRY_TOKEN="$(grep SENTRY_AUTH_TOKEN .env | cut -d= -f2)"

            docker build \
              --build-arg NEXT_PUBLIC_SENTRY_DSN="$SENTRY_DSN" \
              --build-arg SENTRY_AUTH_TOKEN="$SENTRY_TOKEN" \
              --target migrator -t contabai-migrate:latest .

            docker build \
              --build-arg NEXT_PUBLIC_SENTRY_DSN="$SENTRY_DSN" \
              --build-arg SENTRY_AUTH_TOKEN="$SENTRY_TOKEN" \
              --target runner -t contabai:latest .

            # Roda migrations do Prisma (usando stage dedicado com node_modules completo)
            source .env && docker run --rm \
              --network contabil_net \
              -e DATABASE_URL="$DATABASE_URL" \
              contabai-migrate:latest

            # Sobe sem derrubar outros containers
            docker compose up -d --no-deps app

            # Limpa imagens antigas
            docker image prune -f

            echo "✅ Deploy $DEPLOY_TAG concluído!"
