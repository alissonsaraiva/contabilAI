# docker-compose.yml — usado na VPS Hostinger para orquestrar a aplicação
# O PostgreSQL e n8n têm seus próprios compose separados na VPS

services:
  app:
    image: contabai:latest
    container_name: contabai_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      VECTORS_DATABASE_URL: ${VECTORS_DATABASE_URL:-}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      AI_PROVIDER: ${AI_PROVIDER:-claude}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      N8N_CHAT_WEBHOOK_URL: ${N8N_CHAT_WEBHOOK_URL:-}
      CLICKSIGN_API_KEY: ${CLICKSIGN_API_KEY:-}
      ZAPSIGN_API_TOKEN: ${ZAPSIGN_API_TOKEN:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT}
      STORAGE_ACCESS_KEY_ID: ${STORAGE_ACCESS_KEY_ID}
      STORAGE_SECRET_ACCESS_KEY: ${STORAGE_SECRET_ACCESS_KEY}
      STORAGE_BUCKET_NAME: ${STORAGE_BUCKET_NAME}
      STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL}
      STORAGE_REGION: ${STORAGE_REGION}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME}
      NEXT_PUBLIC_CRM_URL: ${NEXT_PUBLIC_CRM_URL:-}
      NEXT_PUBLIC_PORTAL_URL: ${NEXT_PUBLIC_PORTAL_URL:-}
      CRON_SECRET: ${CRON_SECRET}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      HC_EMAIL_SYNC: ${HC_EMAIL_SYNC:-}
      HC_RECONCILIAR_NOTAS: ${HC_RECONCILIAR_NOTAS:-}
      HC_RETRY_DOCUMENTOS: ${HC_RETRY_DOCUMENTOS:-}
      HC_AGENTE: ${HC_AGENTE:-}
      HC_PROCESSAR_PENDENTES: ${HC_PROCESSAR_PENDENTES:-}
      TZ: America/Sao_Paulo
    networks:
      - contabil_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.contabai-http.rule=Host(`avos.digital`) || Host(`www.avos.digital`) || Host(`crm.avos.digital`) || Host(`portal.avos.digital`)"
      - "traefik.http.routers.contabai-http.entrypoints=web"
      - "traefik.http.routers.contabai-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.contabai.rule=Host(`avos.digital`) || Host(`www.avos.digital`) || Host(`crm.avos.digital`) || Host(`portal.avos.digital`)"
      - "traefik.http.routers.contabai.entrypoints=websecure"
      - "traefik.http.routers.contabai.tls.certresolver=letsencrypt"
      - "traefik.http.services.contabai.loadbalancer.server.port=3000"

networks:
  contabil_net:
    external: true
